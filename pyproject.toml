[project]
name = "yoda"
version = "0.1.0"
description = "A local personal AI agent with memory, tools, and chat interfaces."
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    # LLM client (OpenAI-compatible, works with Ollama/LM Studio/OpenAI)
    "openai>=1.40",
    # Async HTTP
    "aiohttp>=3.9",
    "httpx>=0.27",
    # Web UI
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    # CLI
    "click>=8.1",
    # Database (async SQLite for memory)
    "aiosqlite>=0.20",
    # Embeddings (lightweight local sentence-transformers)
    "sentence-transformers>=3.0",
    "numpy>=1.26",
    # Config
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    # Utilities
    "rich>=13.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "ruff>=0.5",
    "mypy>=1.10",
]

[project.scripts]
yoda = "yoda.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["yoda"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "RUF"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
