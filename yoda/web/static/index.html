<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yoda</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--bg2:#16213e;--fg:#e0e0e0;--fg2:#a0a0b0;--accent:#0f3460;--accent2:#533483;--bubble-user:#0f3460;--bubble-bot:#23234a;--input-bg:#16213e;--border:#2a2a4a;--code-bg:#0d0d1a;--hover:#1e1e3e;--shadow:rgba(0,0,0,.3)}
[data-theme="light"]{--bg:#f5f5f5;--bg2:#fff;--fg:#1a1a2e;--fg2:#555;--accent:#4361ee;--accent2:#7209b7;--bubble-user:#4361ee;--bubble-bot:#e8e8f0;--input-bg:#fff;--border:#ddd;--code-bg:#f0f0f5;--hover:#eee;--shadow:rgba(0,0,0,.1)}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--fg)}
#app{display:flex;height:100vh}
/* Sidebar */
#sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
#sidebar-hdr{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
#sidebar-hdr h2{font-size:18px;color:var(--fg)}
#new-chat{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px}
#new-chat:hover{opacity:.85}
#conv-list{flex:1;overflow-y:auto;padding:8px}
.conv-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--fg2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.conv-item:hover,.conv-item.active{background:var(--hover);color:var(--fg)}
/* Main area */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{padding:10px 16px;display:flex;justify-content:flex-end;border-bottom:1px solid var(--border)}
#theme-btn{background:none;border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:18px}
/* Messages */
#messages{flex:1;overflow-y:auto;padding:24px 16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:720px;padding:12px 16px;border-radius:12px;line-height:1.55;font-size:15px;word-wrap:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:var(--bubble-user);color:#fff;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:var(--bubble-bot);border-bottom-left-radius:4px}
/* Code blocks */
.code-wrap{position:relative;margin:8px 0;background:var(--code-bg);border-radius:8px;overflow:hidden}
.code-wrap pre{padding:12px 14px;overflow-x:auto;font-size:13px;line-height:1.5;font-family:'SF Mono',Consolas,monospace}
.copy-btn{position:absolute;top:6px;right:6px;background:var(--accent);color:#fff;border:none;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;opacity:.7}
.copy-btn:hover{opacity:1}
/* Input */
#input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--bg2)}
#msg-input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--fg);font-size:15px;resize:none;font-family:inherit;min-height:44px;max-height:160px}
#msg-input:focus{outline:none;border-color:var(--accent)}
#send-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0 20px;cursor:pointer;font-size:15px;font-weight:600}
#send-btn:disabled{opacity:.4;cursor:default}
/* Mobile */
@media(max-width:700px){#sidebar{display:none}#messages{padding:12px 8px}}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-hdr"><h2>Yoda</h2><button id="new-chat">+ New</button></div>
    <div id="conv-list"></div>
  </div>
  <div id="main">
    <div id="topbar"><button id="theme-btn">&#9790;</button></div>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="msg-input" rows="1" placeholder="Ask Yoda something..."></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>
<script>
const $=s=>document.querySelector(s);
const msgBox=$('#messages'),input=$('#msg-input'),sendBtn=$('#send-btn'),convList=$('#conv-list');
let convId=null,sending=false;

// Auto-resize textarea
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,160)+'px'});

// Theme toggle
$('#theme-btn').onclick=()=>{const h=document.documentElement;const t=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=t;$('#theme-btn').innerHTML=t==='dark'?'&#9790;':'&#9788;';localStorage.setItem('theme',t)};
(()=>{const t=localStorage.getItem('theme');if(t){document.documentElement.dataset.theme=t;$('#theme-btn').innerHTML=t==='dark'?'&#9790;':'&#9788;'}})();

// Render markdown-lite: code blocks + inline code
function renderContent(text){
  // Split by fenced code blocks
  const parts=text.split(/(```[\s\S]*?```)/g);
  return parts.map(p=>{
    const m=p.match(/^```(\w*)\n?([\s\S]*?)```$/);
    if(m){
      const lang=m[1]||'',code=m[2].replace(/&/g,'&amp;').replace(/</g,'&lt;');
      return `<div class="code-wrap"><button class="copy-btn" onclick="copyCode(this)">Copy</button><pre><code>${code}</code></pre></div>`;
    }
    // inline code
    return p.replace(/`([^`]+)`/g,'<code style="background:var(--code-bg);padding:1px 5px;border-radius:3px;font-size:13px">$1</code>');
  }).join('');
}

window.copyCode=function(btn){
  const code=btn.parentElement.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500)});
};

function addMsg(role,content){
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML=renderContent(content);
  msgBox.appendChild(d);
  msgBox.scrollTop=msgBox.scrollHeight;
  return d;
}

async function send(){
  const text=input.value.trim();
  if(!text||sending)return;
  sending=true;sendBtn.disabled=true;
  input.value='';input.style.height='auto';
  addMsg('user',text);
  const botEl=addMsg('assistant','');
  let full='';

  try{
    const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,conversation_id:convId})});
    const reader=res.body.getReader();
    const dec=new TextDecoder();
    let buf='',evtType='';

    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop()||'';
      for(const line of lines){
        if(line.startsWith('event: ')){evtType=line.slice(7).trim();continue}
        if(line.startsWith('data: ')){
          const d=line.slice(6);
          if(evtType==='conv_id'){convId=d.trim();refreshConvs();evtType='';continue}
          if(evtType==='done'||d==='[DONE]'){evtType='';continue}
          evtType='';
          full+=d;
          botEl.innerHTML=renderContent(full);
          msgBox.scrollTop=msgBox.scrollHeight;
        }
      }
    }
  }catch(e){botEl.textContent='Error: '+e.message}
  sending=false;sendBtn.disabled=false;input.focus();
}

sendBtn.onclick=send;
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});

// Conversations
async function refreshConvs(){
  const res=await fetch('/conversations');
  const list=await res.json();
  convList.innerHTML='';
  list.reverse().forEach(c=>{
    const d=document.createElement('div');
    d.className='conv-item'+(c.id===convId?' active':'');
    d.textContent=c.title;
    d.onclick=()=>loadConv(c.id);
    convList.appendChild(d);
  });
}

async function loadConv(id){
  convId=id;
  const res=await fetch('/conversations/'+id);
  const data=await res.json();
  msgBox.innerHTML='';
  (data.messages||[]).forEach(m=>addMsg(m.role,m.content));
  refreshConvs();
}

$('#new-chat').onclick=async()=>{
  const res=await fetch('/conversations',{method:'POST'});
  const c=await res.json();
  convId=c.id;
  msgBox.innerHTML='';
  refreshConvs();
};

refreshConvs();
</script>
</body>
</html>
